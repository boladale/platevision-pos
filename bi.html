<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>PlateVision Analytics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#fff;--bg2:#f8f7f4;--bg3:#f1efe8;
  --tx:#1a1917;--tx2:#6b6a66;--tx3:#9b9a96;
  --bd:rgba(26,25,23,.12);--bd2:rgba(26,25,23,.28);
  --r:10px;--rl:14px;
  --ff:'Outfit',sans-serif;--fm:'JetBrains Mono',monospace;
  --gbg:#e1f5ee;--gtx:#085041;--gbd:#9fe1cb;
  --abg:#faeeda;--atx:#633806;--abd:#fac775;
}
@media(prefers-color-scheme:dark){:root{--bg:#1c1b18;--bg2:#242320;--bg3:#2c2b27;--tx:#f0ede8;--tx2:#9b9a96;--tx3:#6b6a66;--bd:rgba(240,237,232,.12);--bd2:rgba(240,237,232,.28)}}
body{font-family:var(--ff);background:var(--bg3);color:var(--tx);min-height:100vh}
.wrap{max-width:480px;margin:0 auto;background:var(--bg3);min-height:100vh}
header{background:var(--bg);border-bottom:.5px solid var(--bd);padding:11px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.logo{font-size:16px;font-weight:600}.logo span{color:var(--atx)}
.navlinks{display:flex;gap:4px}
.navlinks a{font-size:11px;padding:5px 10px;border-radius:6px;text-decoration:none;color:var(--tx2);background:var(--bg2);border:.5px solid var(--bd)}
.navlinks a.on{color:var(--atx);border-color:var(--abd);background:var(--abg)}
.main{padding:14px 16px 48px}
.kpi-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px}
.kpi{background:var(--bg);border:.5px solid var(--bd);border-radius:var(--rl);padding:12px 14px}
.kpi-val{font-size:18px;font-weight:600;font-family:var(--fm);margin-bottom:2px}
.kpi-lbl{font-size:11px;color:var(--tx2)}
.kpi-chg{font-size:10px;font-weight:500;margin-top:4px}
.up{color:#1D9E75}.dn{color:#D85A30}.fl{color:var(--tx2)}
.section{margin-bottom:18px}
.sec-hd{font-size:13px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.sec-sub{font-size:11px;font-weight:400;color:var(--tx2)}
.card{background:var(--bg);border:.5px solid var(--bd);border-radius:var(--rl);padding:14px;margin-bottom:10px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.bar-row:last-child{margin-bottom:0}
.bar-lbl{font-size:12px;min-width:106px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0}
.bar-track{flex:1;height:8px;background:var(--bg2);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .4s ease}
.bar-val{font-size:11px;font-family:var(--fm);color:var(--tx2);min-width:52px;text-align:right;flex-shrink:0}
.cust-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:.5px solid var(--bd)}
.cust-row:last-child{border-bottom:none}
.cust-av{width:32px;height:32px;border-radius:50%;background:var(--gbg);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--gtx);flex-shrink:0}
.pills{display:flex;gap:6px;margin-bottom:14px}
.pill{font-size:11px;padding:5px 12px;border-radius:20px;border:.5px solid var(--bd);background:none;color:var(--tx2);cursor:pointer;font-family:var(--ff)}
.pill.on{background:var(--abg);border-color:var(--abd);color:var(--atx);font-weight:500}
.insight{background:var(--bg2);border-left:2px solid var(--atx);border-radius:0 var(--r) var(--r) 0;padding:9px 12px;margin-bottom:8px;font-size:12px;color:var(--tx2);line-height:1.6}
.insight strong{color:var(--tx);font-weight:600}
.empty{text-align:center;padding:40px 16px;color:var(--tx2);font-size:13px;line-height:1.7}
.demo-banner{background:var(--gbg);border:.5px solid var(--gbd);border-radius:var(--r);padding:10px 12px;margin-bottom:14px;font-size:12px;color:var(--gtx);display:flex;align-items:center;justify-content:space-between;gap:10px}
button{display:inline-flex;align-items:center;justify-content:center;padding:7px 13px;border-radius:var(--r);border:.5px solid var(--bd2);background:var(--bg);color:var(--tx);font-size:13px;font-weight:500;cursor:pointer;font-family:var(--ff)}
button:hover{background:var(--bg2)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">Plate<span>Vision</span> Analytics</div>
    <div class="navlinks">
      <a href="index.html">POS</a>
      <a href="bi.html" class="on">Analytics</a>
    </div>
  </header>
  <div class="main"><div id="bi"></div></div>
</div>
<script>
// ─── Menu items for demo data generation ──────────────────────────────────────
const MI=[
  {name:'Jollof Rice',cat:'Rice Dishes',price:2500},{name:'Fried Rice',cat:'Rice Dishes',price:2800},{name:'Ofada Rice',cat:'Rice Dishes',price:3000},{name:'White Rice',cat:'Rice Dishes',price:2000},
  {name:'Egusi Soup',cat:'Soups & Swallows',price:3000},{name:'Amala',cat:'Soups & Swallows',price:1500},{name:'Pounded Yam',cat:'Soups & Swallows',price:2000},{name:'Efo Riro',cat:'Soups & Swallows',price:2500},{name:'Pepper Soup',cat:'Soups & Swallows',price:3500},
  {name:'Goat Meat',cat:'Proteins',price:2000},{name:'Grilled Chicken',cat:'Proteins',price:2500},{name:'Fried Fish',cat:'Proteins',price:3000},{name:'Suya',cat:'Proteins',price:2000},{name:'Peppered Snail',cat:'Proteins',price:3500},
  {name:'Plantain',cat:'Sides',price:800},{name:'Moin Moin',cat:'Sides',price:800},{name:'Coleslaw',cat:'Sides',price:600},
  {name:'Soft Drink',cat:'Drinks',price:400},{name:'Beer / Stout',cat:'Drinks',price:800},{name:'Water',cat:'Drinks',price:200}
];
const PHONES=['08012345678','08023456789','08034567890','08045678901','08056789012','08067890123','08078901234','08089012345','08090123456','08011234567','08022345678','08033456789','08044567890','08055678901','08066789012'];
const CAT_COL={'Rice Dishes':'#BA7517','Soups & Swallows':'#1D9E75','Proteins':'#D85A30','Sides':'#639922','Drinks':'#378ADD','Other':'#888780'};
const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

// ─── State ─────────────────────────────────────────────────────────────────────
let DS={range:'7',txs:[],isDemo:false,loading:true};

// ─── Helpers ───────────────────────────────────────────────────────────────────
function fmt(n){return'₦'+Number(n).toLocaleString('en-NG',{minimumFractionDigits:2,maximumFractionDigits:2})}
function fmtK(n){return n>=1000000?'₦'+(n/1000000).toFixed(1)+'M':n>=1000?'₦'+Math.round(n/1000)+'k':'₦'+Math.round(n)}
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function pct(a,b){return b?Math.round((a-b)/b*100):null}
function chgHtml(p){
  if(p===null)return'';
  const s=p>0?'+':'',cls=p>0?'up':p<0?'dn':'fl',arr=p>0?'↑':p<0?'↓':'→';
  return`<div class="kpi-chg ${cls}">${arr} ${s}${p}% vs prev period</div>`;
}

// ─── Demo data generation ──────────────────────────────────────────────────────
function genDemo(){
  const txs=[],now=new Date();
  for(let d=29;d>=0;d--){
    const day=new Date(now);day.setDate(day.getDate()-d);
    const isWknd=day.getDay()===0||day.getDay()===6;
    const cnt=rnd(isWknd?35:18,isWknd?60:38);
    for(let i=0;i<cnt;i++){
      const h=rnd(10,22),m=rnd(0,59);
      const dt=new Date(day.getFullYear(),day.getMonth(),day.getDate(),h,m);
      const n=rnd(1,4);const used=new Set();const items=[];
      for(let j=0;j<n;j++){
        let idx;do{idx=rnd(0,MI.length-1)}while(used.has(idx));used.add(idx);
        const mi=MI[idx];const qty=Math.random()>0.75?2:1;
        items.push({name:mi.name,cat:mi.cat,price:mi.price,qty,total:mi.price*qty});
      }
      const sub=items.reduce((s,x)=>s+x.total,0),vat=sub*0.075,total=sub+vat;
      txs.push({id:'D'+dt.getTime().toString(36)+i,date:dt.toISOString(),amount:total,sub,vat,items,custPhone:Math.random()>0.45?PHONES[rnd(0,PHONES.length-1)]:null});
    }
  }
  return txs.sort((a,b)=>new Date(b.date)-new Date(a.date));
}

// ─── Analytics computation ────────────────────────────────────────────────────
function getWin(range){
  const now=new Date();
  if(range==='1'){const s=new Date(now.getFullYear(),now.getMonth(),now.getDate());return{start:s,end:now}}
  if(range==='7'){const s=new Date(now);s.setDate(s.getDate()-6);s.setHours(0,0,0,0);return{start:s,end:now}}
  const s=new Date(now);s.setDate(s.getDate()-29);s.setHours(0,0,0,0);return{start:s,end:now}
}

function compute(txs,range){
  const{start,end}=getWin(range);
  const cur=txs.filter(t=>{const d=new Date(t.date);return d>=start&&d<=end});
  const span=end-start;
  const pEnd=new Date(start.getTime()-1);const pStart=new Date(pEnd.getTime()-span);
  const prev=txs.filter(t=>{const d=new Date(t.date);return d>=pStart&&d<=pEnd});

  const rev=cur.reduce((s,t)=>s+t.amount,0);
  const pRev=prev.reduce((s,t)=>s+t.amount,0);
  const orders=cur.length,pOrders=prev.length;
  const avg=orders?rev/orders:0,pAvg=pOrders?pRev/pOrders:0;
  const uniq=new Set(cur.filter(t=>t.custPhone).map(t=>t.custPhone)).size;
  const pUniq=new Set(prev.filter(t=>t.custPhone).map(t=>t.custPhone)).size;

  // Chart data
  let chartData=[];
  const now=new Date();
  if(range==='1'){
    for(let h=8;h<=22;h++){
      const hTx=cur.filter(t=>new Date(t.date).getHours()===h);
      chartData.push({label:h<12?h+'am':h===12?'12pm':(h-12)+'pm',value:hTx.reduce((s,t)=>s+t.amount,0),highlight:now.getHours()===h});
    }
  }else{
    const days=range==='7'?7:30;
    for(let d=days-1;d>=0;d--){
      const day=new Date(now);day.setDate(day.getDate()-d);
      const ds=new Date(day.getFullYear(),day.getMonth(),day.getDate());
      const de=new Date(ds);de.setDate(de.getDate()+1);
      const dTx=cur.filter(t=>{const td=new Date(t.date);return td>=ds&&td<de});
      const showLbl=days<=7||(d%Math.ceil(days/7)===0)||d===0;
      const lbl=days<=7?DAYS[day.getDay()]:(showLbl?day.getDate().toString():'');
      chartData.push({label:lbl,value:dTx.reduce((s,t)=>s+t.amount,0),highlight:d===0});
    }
  }

  // Best sellers
  const imap={};
  cur.forEach(t=>t.items.forEach(it=>{
    if(!imap[it.name])imap[it.name]={name:it.name,cat:it.cat,qty:0,rev:0};
    imap[it.name].qty+=it.qty;imap[it.name].rev+=it.total;
  }));
  const sellers=Object.values(imap).sort((a,b)=>b.rev-a.rev).slice(0,7);

  // Categories
  const cmap={};
  cur.forEach(t=>t.items.forEach(it=>{
    const c=it.cat||'Other';
    if(!cmap[c])cmap[c]={cat:c,rev:0};
    cmap[c].rev+=it.total;
  }));
  const cats=Object.values(cmap).sort((a,b)=>b.rev-a.rev);

  // Top customers
  const cumap={};
  cur.filter(t=>t.custPhone).forEach(t=>{
    if(!cumap[t.custPhone])cumap[t.custPhone]={phone:t.custPhone,spend:0,visits:0};
    cumap[t.custPhone].spend+=t.amount;cumap[t.custPhone].visits++;
  });
  const topCusts=Object.values(cumap).sort((a,b)=>b.spend-a.spend).slice(0,5);

  // Peak hour
  const hmap={};cur.forEach(t=>{const h=new Date(t.date).getHours();hmap[h]=(hmap[h]||0)+1});
  const ph=Object.entries(hmap).sort((a,b)=>b[1]-a[1])[0];
  const peakLabel=ph?(+ph[0]<12?ph[0]+'am':+ph[0]===12?'12pm':(+ph[0]-12)+'pm')+'–'+(+ph[0]+1<12?(+ph[0]+1)+'am':+ph[0]+1===12?'12pm':(+ph[0]+1-12)+'pm'):'N/A';

  return{rev,pRev,orders,pOrders,avg,pAvg,uniq,pUniq,chartData,sellers,cats,topCusts,peakLabel};
}

// ─── SVG bar chart ─────────────────────────────────────────────────────────────
function barChart(data,w,h){
  if(!data.length)return'';
  const maxV=Math.max(...data.map(d=>d.value),1);
  const ml=46,mr=8,mt=8,mb=26;
  const cw=w-ml-mr,ch=h-mt-mb;
  const bw=Math.max(3,Math.floor(cw/data.length)-2);
  const gap=data.length>1?(cw-bw*data.length)/(data.length-1):0;

  const grids=[0.25,0.5,0.75,1].map(f=>{
    const y=mt+ch*(1-f),v=maxV*f;
    const lbl=v>=1e6?Math.round(v/1e6)+'M':v>=1000?Math.round(v/1000)+'k':Math.round(v);
    return`<line x1="${ml}" y1="${y.toFixed(1)}" x2="${w-mr}" y2="${y.toFixed(1)}" stroke="var(--bd)" stroke-width="0.5"/>
<text x="${ml-4}" y="${(y+3).toFixed(1)}" text-anchor="end" font-size="9" fill="var(--tx2)" font-family="var(--fm)">₦${lbl}</text>`;
  }).join('');

  const bars=data.map((d,i)=>{
    const x=ml+i*(bw+gap);
    const bh=Math.max(d.value>0?2:0,ch*(d.value/maxV));
    const y=mt+ch-bh;
    return`<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw}" height="${bh.toFixed(1)}" fill="${d.highlight?'#BA7517':'#FAEEDA'}" stroke="${d.highlight?'#633806':'#FAC775'}" stroke-width="0.5" rx="1"/>
${d.label?`<text x="${(x+bw/2).toFixed(1)}" y="${h-4}" text-anchor="middle" font-size="9" fill="var(--tx2)" font-family="var(--fm)">${d.label}</text>`:''}`;
  }).join('');

  return`<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:${h}px;display:block">${grids}${bars}</svg>`;
}

// ─── Insight callouts ──────────────────────────────────────────────────────────
function insightHtml(d){
  const{sellers,cats,peakLabel,rev,avg,orders}=d;
  const bits=[];
  if(sellers[0])bits.push(`<strong>${sellers[0].name}</strong> is your top earner — ${fmt(sellers[0].rev)} across ${sellers[0].qty} portions.`);
  if(cats[0]&&rev)bits.push(`<strong>${cats[0].cat}</strong> contributes ${Math.round(cats[0].rev/rev*100)}% of total revenue — your dominant category.`);
  if(peakLabel&&peakLabel!=='N/A')bits.push(`Peak ordering window is <strong>${peakLabel}</strong> — schedule extra staff for this slot.`);
  if(avg>0)bits.push(`Average order value is <strong>${fmt(avg)}</strong>. One extra side dish per table can lift this by 20–30%.`);
  return bits.map(t=>`<div class="insight">${t}</div>`).join('');
}

// ─── MAIN RENDER ───────────────────────────────────────────────────────────────
function render(){
  const{range,txs,isDemo,loading}=DS;
  if(loading){document.getElementById('bi').innerHTML=`<div class="empty" style="padding-top:48px">Loading analytics…</div>`;return}

  const d=compute(txs,range);
  const{rev,pRev,orders,pOrders,avg,pAvg,uniq,pUniq,chartData,sellers,cats,topCusts}=d;
  const rl=range==='1'?'Today':range==='7'?'Last 7 days':'Last 30 days';

  document.getElementById('bi').innerHTML=`
    <div style="padding:4px 0 10px;display:flex;align-items:center;justify-content:space-between">
      <p style="font-size:11px;color:var(--tx2)">${new Date().toLocaleDateString('en-NG',{weekday:'long',dateStyle:'long'})}</p>
      <span style="font-size:10px;padding:3px 9px;background:var(--abg);color:var(--atx);border:.5px solid var(--abd);border-radius:6px;font-weight:500">NGN ₦</span>
    </div>

    ${isDemo?`<div class="demo-banner">
      <span>30 days of demo data. Real POS receipts appear here automatically once generated from index.html.</span>
      <button id="clrDemo" style="font-size:11px;padding:4px 8px;flex-shrink:0;white-space:nowrap;color:var(--gtx);border-color:var(--gbd);background:none">Clear</button>
    </div>`:''}

    <div class="pills">
      ${['1','7','30'].map(r=>`<button class="pill ${range===r?'on':''}" data-r="${r}">${r==='1'?'Today':r==='7'?'7 Days':'30 Days'}</button>`).join('')}
    </div>

    <div class="kpi-grid">
      <div class="kpi">
        <div class="kpi-val" style="color:var(--atx)">${fmtK(rev)}</div>
        <div class="kpi-lbl">Revenue · ${rl}</div>${chgHtml(pct(rev,pRev))}
      </div>
      <div class="kpi">
        <div class="kpi-val">${orders.toLocaleString()}</div>
        <div class="kpi-lbl">Orders · ${rl}</div>${chgHtml(pct(orders,pOrders))}
      </div>
      <div class="kpi">
        <div class="kpi-val">${fmtK(avg)}</div>
        <div class="kpi-lbl">Avg order value</div>${chgHtml(pct(avg,pAvg))}
      </div>
      <div class="kpi">
        <div class="kpi-val" style="color:var(--gtx)">${uniq}</div>
        <div class="kpi-lbl">Loyalty customers</div>${chgHtml(pct(uniq,pUniq))}
      </div>
    </div>

    <div class="section">
      <div class="sec-hd">Revenue trend <span class="sec-sub">${rl}</span></div>
      <div class="card" style="padding:12px 14px 8px">
        ${barChart(chartData,416,range==='1'?110:120)}
      </div>
    </div>

    <div class="section">
      <div class="sec-hd">AI insights</div>
      ${insightHtml(d)}
    </div>

    <div class="section">
      <div class="sec-hd">Best sellers <span class="sec-sub">by revenue</span></div>
      <div class="card">
        ${sellers.map((s,i)=>`<div class="bar-row">
          <div class="bar-lbl" style="${i===0?'font-weight:500':''}">${s.name}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${Math.round(s.rev/(sellers[0]?.rev||1)*100)}%;background:${CAT_COL[s.cat]||'#888'}"></div></div>
          <div class="bar-val">${fmtK(s.rev)}</div>
        </div>`).join('')}
      </div>
    </div>

    <div class="section">
      <div class="sec-hd">Best sellers <span class="sec-sub">by quantity</span></div>
      <div class="card">
        ${sellers.map(s=>`<div class="bar-row">
          <div class="bar-lbl">${s.name}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${Math.round(s.qty/(sellers[0]?.qty||1)*100)}%;background:${CAT_COL[s.cat]||'#888'}"></div></div>
          <div class="bar-val">${s.qty} pcs</div>
        </div>`).join('')}
      </div>
    </div>

    <div class="section">
      <div class="sec-hd">Revenue by category</div>
      <div class="card">
        ${cats.map(c=>`<div class="bar-row">
          <div style="display:flex;align-items:center;gap:6px;min-width:110px;flex-shrink:0">
            <div style="width:8px;height:8px;border-radius:50%;background:${CAT_COL[c.cat]||'#888'};flex-shrink:0"></div>
            <span style="font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.cat}</span>
          </div>
          <div class="bar-track"><div class="bar-fill" style="width:${rev?Math.round(c.rev/rev*100):0}%;background:${CAT_COL[c.cat]||'#888'}"></div></div>
          <div class="bar-val">${rev?Math.round(c.rev/rev*100):0}%</div>
        </div>`).join('')}
      </div>
    </div>

    <div class="section">
      <div class="sec-hd">Top customers <span class="sec-sub">by spend</span></div>
      <div class="card">
        ${topCusts.length?topCusts.map((c,i)=>`<div class="cust-row">
          <span style="width:20px;font-size:13px;text-align:center;flex-shrink:0">${['🥇','🥈','🥉'][i]||i+1}</span>
          <div class="cust-av">${c.phone.slice(-3,-1)}</div>
          <div style="flex:1">
            <p style="font-size:13px;font-weight:500;font-family:var(--fm)">${c.phone.slice(0,5)}···${c.phone.slice(-3)}</p>
            <p style="font-size:11px;color:var(--tx2)">${c.visits} visit${c.visits!==1?'s':''} · ${Math.floor(c.spend*0.01)} pts</p>
          </div>
          <div style="text-align:right">
            <p style="font-family:var(--fm);font-size:13px;font-weight:500">${fmt(c.spend)}</p>
            <p style="font-size:10px;color:var(--tx2)">total spend</p>
          </div>
        </div>`).join(''):`<p style="font-size:12px;color:var(--tx2)">No loyalty data for this period.</p>`}
      </div>
    </div>`;

  // Events
  document.querySelectorAll('[data-r]').forEach(b=>b.onclick=()=>{DS.range=b.dataset.r;render()});
  document.getElementById('clrDemo')?.addEventListener('click',async()=>{
    localStorage.removeItem('txlog2');DS.txs=[];DS.isDemo=false;render();
  });
}

// ─── Init ──────────────────────────────────────────────────────────────────────
async function init(){
  DS.loading=true;render();
  try{
    const raw=localStorage.getItem('txlog2');
    if(raw&&JSON.parse(raw).length){DS.txs=JSON.parse(raw);DS.isDemo=false;}
    else{DS.txs=genDemo();DS.isDemo=true;localStorage.setItem('txlog2',JSON.stringify(DS.txs));}
  }catch{DS.txs=genDemo();DS.isDemo=true;}
  DS.loading=false;render();
}

init();
</script>
