<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>PlateVision POS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#fff;--bg2:#f8f7f4;--bg3:#f1efe8;
  --tx:#1a1917;--tx2:#6b6a66;--tx3:#9b9a96;
  --bd:rgba(26,25,23,.12);--bd2:rgba(26,25,23,.28);
  --r:10px;--rl:14px;
  --ff:'Outfit',sans-serif;--fm:'JetBrains Mono',monospace;
  --gbg:#e1f5ee;--gtx:#085041;--gbd:#9fe1cb;
  --abg:#faeeda;--atx:#633806;--abd:#fac775;
  --rbg:#fcebeb;--rtx:#a32d2d;
}
@media(prefers-color-scheme:dark){:root{--bg:#1c1b18;--bg2:#242320;--bg3:#2c2b27;--tx:#f0ede8;--tx2:#9b9a96;--tx3:#6b6a66;--bd:rgba(240,237,232,.12);--bd2:rgba(240,237,232,.28)}}
body{font-family:var(--ff);background:var(--bg3);color:var(--tx);min-height:100vh}
.wrap{max-width:480px;margin:0 auto;background:var(--bg3);min-height:100vh}
header{background:var(--bg);border-bottom:.5px solid var(--bd);padding:11px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.logo{font-size:16px;font-weight:600}.logo span{color:var(--atx)}
.hright{display:flex;align-items:center;gap:8px}
.navlinks{display:flex;gap:4px}
.navlinks a{font-size:11px;padding:5px 10px;border-radius:6px;text-decoration:none;color:var(--tx2);background:var(--bg2);border:.5px solid var(--bd)}
.navlinks a.on{color:var(--atx);border-color:var(--abd);background:var(--abg)}
.main{padding:14px 16px 48px}
.tabs{display:flex;background:var(--bg);border-radius:var(--rl);border:.5px solid var(--bd);padding:4px;margin-bottom:14px;gap:2px}
.tab{flex:1;padding:7px 2px;background:none;border:none;border-radius:8px;font-size:10px;font-weight:500;color:var(--tx2);cursor:pointer;font-family:var(--ff);transition:all .15s;white-space:nowrap}
.tab.on{background:var(--abg);color:var(--atx)}
.card{background:var(--bg);border:.5px solid var(--bd);border-radius:var(--rl);padding:14px;margin-bottom:10px}
.form-card{background:var(--bg);border:1px solid var(--bd2);border-radius:var(--rl);padding:14px;margin-bottom:12px}
.drop{border:1.5px dashed var(--bd2);border-radius:var(--rl);padding:28px 16px;text-align:center;cursor:pointer;transition:border-color .15s}
.drop:hover{border-color:var(--tx3)}
.drop img{width:100%;border-radius:var(--r);margin:10px 0;max-height:220px;object-fit:cover;display:block}
.irow{display:flex;gap:8px;margin-bottom:8px}
.field{flex:1}
.field label{font-size:10px;color:var(--tx2);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:3px}
.field input,.field select{width:100%;font-size:13px;padding:8px 10px;border-radius:var(--r);border:.5px solid var(--bd2);background:var(--bg2);color:var(--tx);outline:none;font-family:var(--ff)}
.field input:focus,.field select:focus{border-color:var(--abd)}
button{display:inline-flex;align-items:center;justify-content:center;padding:8px 14px;border-radius:var(--r);border:.5px solid var(--bd2);background:var(--bg);color:var(--tx);font-size:13px;font-weight:500;cursor:pointer;font-family:var(--ff);transition:all .12s}
button:hover{background:var(--bg2)}
button:disabled{opacity:.45;cursor:not-allowed}
button.primary{background:var(--abg);border-color:var(--abd);color:var(--atx);width:100%;padding:12px;font-size:14px}
button.dbtn{color:var(--rtx)}
.mi-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:.5px solid var(--bd)}
.mi-row:last-child{border-bottom:none}
.av{display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0;border-radius:var(--r)}
.trow{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px}
.trow.big{font-size:15px;font-weight:600;padding-top:8px;margin-top:4px;border-top:.5px solid var(--bd)}
.receipt{font-family:var(--fm);font-size:12px;background:var(--bg);border:.5px solid var(--bd);border-radius:var(--rl);padding:20px}
.r-hd{text-align:center;border-bottom:1px dashed var(--bd2);padding-bottom:14px;margin-bottom:14px}
.r-row{display:flex;justify-content:space-between;margin-bottom:5px;gap:4px}
.r-div{border:none;border-top:1px dashed var(--bd2);margin:8px 0}
.r-tot{display:flex;justify-content:space-between;font-size:14px;font-weight:600;margin-top:8px;padding-top:8px;border-top:1px solid var(--bd2)}
.loy-box{background:var(--gbg);border:.5px solid var(--gbd);border-radius:var(--r);padding:10px;margin-top:10px}
.loy-box p{font-size:11px;color:var(--gtx);margin-bottom:2px}
.r-foot{text-align:center;font-size:10px;color:var(--tx2);margin-top:12px;padding-top:12px;border-top:1px dashed var(--bd2)}
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:10px}
.stat{background:var(--bg2);border-radius:var(--r);padding:10px}
.stat-val{font-size:16px;font-weight:500}
.stat-lbl{font-size:10px;color:var(--tx2);margin-top:2px}
.tx-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:.5px solid var(--bd)}
.tx-row:last-child{border-bottom:none}
.empty{text-align:center;padding:32px 16px;color:var(--tx2);font-size:13px;line-height:1.7}
.spin{display:inline-block;width:14px;height:14px;border:2px solid var(--bd2);border-top-color:var(--tx);border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes sp{to{transform:rotate(360deg)}}
.err{background:var(--rbg);color:var(--rtx);border-radius:var(--r);padding:10px 12px;font-size:12px;margin:10px 0}
.srch{width:100%;padding:9px 12px;border-radius:var(--r);border:.5px solid var(--bd2);background:var(--bg2);color:var(--tx);font-size:13px;outline:none;font-family:var(--ff);margin-bottom:8px}
.pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.pill{font-size:11px;padding:4px 10px;border-radius:20px;border:.5px solid var(--bd);background:none;color:var(--tx2);cursor:pointer;font-family:var(--ff)}
.pill.on{background:var(--abg);border-color:var(--abd);color:var(--atx);font-weight:500}
.qbtn{width:27px;height:27px;border-radius:50%;border:.5px solid var(--bd2);background:var(--bg2);color:var(--tx);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0}
.badge{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:500}
.order-row{display:flex;align-items:center;gap:8px;padding:9px 14px;border-bottom:.5px solid var(--bd)}
.order-row:last-child{border-bottom:none}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.panel{background:var(--bg);border-radius:var(--rl) var(--rl) 0 0;padding:20px 20px 32px;width:100%;max-width:480px}
.panel h3{font-size:15px;font-weight:600;margin-bottom:14px}
.match-box{background:var(--gbg);border:.5px solid var(--gbd);border-radius:var(--r);padding:10px 12px;margin-bottom:8px}
.est-box{background:var(--bg2);border:.5px solid var(--bd);border-radius:var(--r);padding:10px 12px;margin-bottom:8px}
@media print{header,.tabs,.hright{display:none!important}.main{padding:0}.card,.receipt{border:none}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">Plate<span>Vision</span></div>
    <div class="hright">
      <div class="navlinks">
        <a href="index.html" class="on">POS</a>
        <a href="bi.html">Analytics</a>
      </div>
      <button id="settingsBtn" style="padding:6px 10px;font-size:12px">&#9881; API</button>
    </div>
  </header>
  <div class="main"><div id="app"></div></div>
</div>

<div id="settingsOverlay" style="display:none" class="overlay">
  <div class="panel">
    <h3>Anthropic API Key</h3>
    <p style="font-size:12px;color:var(--tx2);margin-bottom:14px;line-height:1.6">Required for AI food scanning. Get yours at <strong>console.anthropic.com</strong>. Stored only in your browser — never shared.</p>
    <div class="field" style="margin-bottom:14px">
      <label>API Key</label>
      <input id="apiKeyIn" type="password" placeholder="sk-ant-api03-...">
    </div>
    <div style="display:flex;gap:8px">
      <button id="saveKey" class="primary" style="padding:10px">Save key</button>
      <button id="closeSettings" style="padding:10px 16px">Cancel</button>
    </div>
  </div>
</div>

<script>
// ── Safe localStorage wrapper ──────────────────────────────────────────────────
var store = {
  get: function(k) { try { var v=localStorage.getItem(k); return v ? {value:v} : null; } catch(e){ return null; } },
  set: function(k,v) { try { localStorage.setItem(k,v); } catch(e){} },
  del: function(k) { try { localStorage.removeItem(k); } catch(e){} }
};

// ── API ────────────────────────────────────────────────────────────────────────
function getKey(){ return localStorage.getItem('pv_apikey') || ''; }

async function callClaude(messages) {
  var key = getKey();
  if (!key) throw new Error('No API key. Tap the API button in the top-right corner.');
  var res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': key,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1000, messages: messages })
  });
  var data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data;
}

// ── Constants ──────────────────────────────────────────────────────────────────
var CATS = ['Rice Dishes','Soups & Swallows','Proteins','Sides','Drinks','Other'];
var CAT_COL = {
  'Rice Dishes':    {bg:'#FAEEDA',tx:'#633806',br:'#FAC775'},
  'Soups & Swallows':{bg:'#E1F5EE',tx:'#085041',br:'#9FE1CB'},
  'Proteins':       {bg:'#FAECE7',tx:'#4A1B0C',br:'#F5C4B3'},
  'Sides':          {bg:'#EAF3DE',tx:'#173404',br:'#C0DD97'},
  'Drinks':         {bg:'#E6F1FB',tx:'#042C53',br:'#B5D4F4'},
  'Other':          {bg:'#F1EFE8',tx:'#2C2C2A',br:'#D3D1C7'}
};
var PV = 10, PR = 0.01;
var DEFAULT_MENU = [
  {id:'m1',name:'Jollof Rice',cat:'Rice Dishes',price:2500},
  {id:'m2',name:'Fried Rice',cat:'Rice Dishes',price:2800},
  {id:'m3',name:'Ofada Rice',cat:'Rice Dishes',price:3000},
  {id:'m4',name:'White Rice',cat:'Rice Dishes',price:2000},
  {id:'m5',name:'Egusi Soup',cat:'Soups & Swallows',price:3000},
  {id:'m6',name:'Amala',cat:'Soups & Swallows',price:1500},
  {id:'m7',name:'Pounded Yam',cat:'Soups & Swallows',price:2000},
  {id:'m8',name:'Efo Riro',cat:'Soups & Swallows',price:2500},
  {id:'m9',name:'Pepper Soup',cat:'Soups & Swallows',price:3500},
  {id:'m10',name:'Goat Meat',cat:'Proteins',price:2000},
  {id:'m11',name:'Grilled Chicken',cat:'Proteins',price:2500},
  {id:'m12',name:'Fried Fish',cat:'Proteins',price:3000},
  {id:'m13',name:'Suya',cat:'Proteins',price:2000},
  {id:'m14',name:'Peppered Snail',cat:'Proteins',price:3500},
  {id:'m15',name:'Plantain',cat:'Sides',price:800},
  {id:'m16',name:'Moin Moin',cat:'Sides',price:800},
  {id:'m17',name:'Coleslaw',cat:'Sides',price:600},
  {id:'m18',name:'Soft Drink',cat:'Drinks',price:400},
  {id:'m19',name:'Beer / Stout',cat:'Drinks',price:800},
  {id:'m20',name:'Water',cat:'Drinks',price:200}
];

// ── State ──────────────────────────────────────────────────────────────────────
var S = {
  tab:'menu', menu:[], imgs:{},
  order:[],
  imgSrc:null, imgB64:null, imgType:'image/jpeg',
  busy:false, err:null, scanRes:null,
  form:null,
  mSearch:'', mCat:'All',
  oCat:'All', oSearch:'',
  custName:'', custPhone:'',
  receipt:null,
  loyPhone:'', loyData:null
};

// ── Helpers ────────────────────────────────────────────────────────────────────
function ss(p) { Object.assign(S, p); render(); }

function fmt(n) {
  try { return '\u20a6' + Number(n).toLocaleString('en-NG', {minimumFractionDigits:2, maximumFractionDigits:2}); }
  catch(e) { return '\u20a6' + Number(n).toFixed(2); }
}

function fmtDate(d) {
  try {
    return d.toLocaleDateString('en-NG', {weekday:'long', year:'numeric', month:'long', day:'numeric'});
  } catch(e) {
    return d.toDateString();
  }
}

function fmtDateTime(d) {
  try {
    return d.toLocaleString('en-NG', {year:'numeric', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});
  } catch(e) {
    return d.toDateString() + ' ' + d.toTimeString().slice(0,5);
  }
}

function fmtMonthYear(d) {
  try { return d.toLocaleDateString('en-NG', {month:'short', year:'numeric'}); }
  catch(e) { return d.toDateString(); }
}

function fmtMedium(d) {
  try { return d.toLocaleDateString('en-NG', {year:'numeric', month:'short', day:'numeric'}); }
  catch(e) { return d.toDateString(); }
}

function uid() { return 'x' + Date.now().toString(36) + Math.random().toString(36).slice(2,5); }
function genId() { return 'RCP' + Date.now().toString(36).toUpperCase(); }

function f2b64(file) {
  return new Promise(function(res, rej) {
    var r = new FileReader();
    r.onload = function() { res(r.result.split(',')[1]); };
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

function resizeThumb(b64, mt, sz) {
  sz = sz || 120;
  return new Promise(function(res) {
    var img = new Image();
    img.onload = function() {
      var sc = Math.min(sz/img.width, sz/img.height, 1);
      var c = document.createElement('canvas');
      c.width = Math.round(img.width * sc);
      c.height = Math.round(img.height * sc);
      c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
      res(c.toDataURL('image/jpeg', 0.8).split(',')[1]);
    };
    img.src = 'data:' + (mt || 'image/jpeg') + ';base64,' + b64;
  });
}

function col(cat) { return CAT_COL[cat] || CAT_COL['Other']; }

function av(name, cat, sz) {
  sz = sz || 40;
  var c = col(cat);
  return '<div class="av" style="width:'+sz+'px;height:'+sz+'px;background:'+c.bg+';color:'+c.tx+';border:.5px solid '+c.br+';flex-shrink:0">'+name.slice(0,2).toUpperCase()+'</div>';
}

function imgOrAv(id, name, cat, sz) {
  sz = sz || 40;
  if (S.imgs[id]) return '<img src="'+S.imgs[id]+'" style="width:'+sz+'px;height:'+sz+'px;border-radius:var(--r);object-fit:cover;flex-shrink:0">';
  return av(name, cat, sz);
}

function catBadge(cat) {
  var c = col(cat);
  return '<span class="badge" style="background:'+c.bg+';color:'+c.tx+';border:.5px solid '+c.br+'">'+cat+'</span>';
}

function srcBadge(s) {
  if (s==='scan') return '<span class="badge" style="background:#E1F5EE;color:#085041;border:.5px solid #9FE1CB">Scanned</span>';
  if (s==='est')  return '<span class="badge" style="background:#F1EFE8;color:#5F5E5A;border:.5px solid #D3D1C7">Estimate</span>';
  return '<span class="badge" style="background:#E6F1FB;color:#042C53;border:.5px solid #B5D4F4">Menu</span>';
}

// ── Menu persistence ───────────────────────────────────────────────────────────
async function loadMenu() {
  var r = store.get('pv_menu');
  S.menu = r ? JSON.parse(r.value) : JSON.parse(JSON.stringify(DEFAULT_MENU));
  if (!r) store.set('pv_menu', JSON.stringify(DEFAULT_MENU));
  for (var i = 0; i < S.menu.length; i++) {
    var ir = store.get('pv_img:' + S.menu[i].id);
    if (ir) { S.imgs[S.menu[i].id] = 'data:image/jpeg;base64,' + ir.value; }
  }
  render();
}

function saveMenu() { store.set('pv_menu', JSON.stringify(S.menu)); }

// ── Customer ───────────────────────────────────────────────────────────────────
function getCust(ph) {
  var r = store.get('pv_c:' + ph);
  return r ? JSON.parse(r.value) : null;
}
function saveCust(ph, d) { store.set('pv_c:' + ph, JSON.stringify(d)); }

// ── Transaction log ────────────────────────────────────────────────────────────
function logTx(tx) {
  var r = store.get('txlog2');
  var arr = r ? JSON.parse(r.value) : [];
  arr.unshift(tx);
  store.set('txlog2', JSON.stringify(arr.slice(0, 5000)));
}

// ── Form submit ────────────────────────────────────────────────────────────────
async function submitForm() {
  var f = S.form;
  if (!f.name.trim() || !f.price) return;
  var menu = S.menu.slice();
  if (f.mode === 'add') {
    var id = uid();
    menu.push({id:id, name:f.name.trim(), cat:f.cat, price:+f.price});
    if (f.imgB64) {
      var t = await resizeThumb(f.imgB64, f.imgType);
      store.set('pv_img:' + id, t);
      S.imgs[id] = 'data:image/jpeg;base64,' + t;
    }
  } else {
    var idx = menu.findIndex(function(m){return m.id===f.id;});
    if (idx > -1) menu[idx] = {id:f.id, name:f.name.trim(), cat:f.cat, price:+f.price};
    if (f.imgB64) {
      var t2 = await resizeThumb(f.imgB64, f.imgType);
      store.set('pv_img:' + f.id, t2);
      S.imgs[f.id] = 'data:image/jpeg;base64,' + t2;
    }
  }
  S.menu = menu;
  saveMenu();
  ss({form:null});
}

function delItem(id) {
  S.menu = S.menu.filter(function(m){return m.id!==id;});
  store.del('pv_img:' + id);
  delete S.imgs[id];
  saveMenu();
  render();
}

// ── Scan ───────────────────────────────────────────────────────────────────────
async function doScan() {
  if (!S.imgB64 || S.busy) return;
  ss({busy:true, err:null, scanRes:null});
  try {
    var ml = S.menu.map(function(m){return '- '+m.name+' ('+m.cat+'): \u20a6'+m.price;}).join('\n');
    var data = await callClaude([{role:'user', content:[
      {type:'image', source:{type:'base64', media_type:S.imgType, data:S.imgB64}},
      {type:'text', text:'You are a restaurant POS system. This restaurant menu:\n'+ml+'\n\nAnalyze this food photo. For each visible food item:\n- If it matches a menu item (even approximately), use exact menu name and price\n- If not on menu, estimate a fair Naira price for a mid-range Lagos restaurant\nReturn ONLY valid JSON, no markdown:\n{"matched":[{"menuName":"Jollof Rice","menuPrice":2500,"quantity":1}],"unmatched":[{"name":"Extra sauce","estimatedPrice":200,"quantity":1}]}\nIf no food: {"matched":[],"unmatched":[],"error":"No food detected"}'}
    ]}]);
    var text = data.content.filter(function(b){return b.type==='text';}).map(function(b){return b.text;}).join('');
    var r = JSON.parse(text.replace(/```json|```/g,'').trim());
    if (r.error && !r.matched.length && !r.unmatched.length) ss({busy:false, err:r.error||'No food detected.'});
    else ss({busy:false, scanRes:r});
  } catch(e) { ss({busy:false, err:e.message||'Scan failed. Try again.'}); }
}

function addScanned() {
  var newO = S.order.slice();
  (S.scanRes.matched||[]).forEach(function(it) {
    var mi = S.menu.find(function(m){return m.name===it.menuName;});
    var ex = newO.find(function(o){return o.name===it.menuName;});
    if (ex) { ex.qty += (it.quantity||1); ex.total = ex.price * ex.qty; }
    else newO.push({id:uid(), menuId:mi?mi.id:null, name:it.menuName, price:it.menuPrice, qty:it.quantity||1, total:it.menuPrice*(it.quantity||1), cat:mi?mi.cat:'Other', src:'scan'});
  });
  (S.scanRes.unmatched||[]).forEach(function(it) {
    var ex = newO.find(function(o){return o.name===it.name;});
    if (ex) { ex.qty += (it.quantity||1); ex.total = ex.price * ex.qty; }
    else newO.push({id:uid(), name:it.name, price:it.estimatedPrice, qty:it.quantity||1, total:it.estimatedPrice*(it.quantity||1), cat:'Other', src:'est'});
  });
  ss({order:newO, tab:'order'});
}

function addFromMenu(m) {
  var ex = S.order.find(function(o){return o.menuId===m.id;});
  if (ex) ss({order:S.order.map(function(o){return o.menuId===m.id?Object.assign({},o,{qty:o.qty+1,total:o.price*(o.qty+1)}):o;})});
  else ss({order:S.order.concat([{id:uid(), menuId:m.id, name:m.name, price:m.price, qty:1, total:m.price, cat:m.cat, src:'menu'}])});
}

function qChange(id, d) {
  var item = S.order.find(function(o){return o.id===id;});
  var newQ = Math.max(1, (item ? item.qty : 1) + d);
  ss({order:S.order.map(function(o){return o.id===id?Object.assign({},o,{qty:newQ,total:o.price*newQ}):o;})});
}

// ── Receipt ────────────────────────────────────────────────────────────────────
function genReceipt() {
  if (!S.order.length) return;
  var id = genId(), now = new Date();
  var order = S.order, custName = S.custName, custPhone = S.custPhone;
  var sub = order.reduce(function(s,x){return s+x.total;}, 0);
  var vat = sub * 0.075, total = sub + vat, pts = Math.floor(total * PR);
  var cust = custPhone ? getCust(custPhone) : null;
  if (custPhone) {
    if (!cust) cust = {name:custName||'Guest', phone:custPhone, points:0, spent:0, txs:[], joined:now.toISOString()};
    cust.points += pts; cust.spent += total;
    if (custName) cust.name = custName;
    cust.txs.unshift({id:id, date:now.toISOString(), amount:total, pts:pts, items:order.map(function(x){return x.name;})});
    saveCust(custPhone, cust);
  }
  logTx({id:id, date:now.toISOString(), amount:total, sub:sub, vat:vat,
    items:order.map(function(o){return {name:o.name,cat:o.cat||'Other',price:o.price,qty:o.qty,total:o.total};}),
    custPhone:custPhone||null});
  ss({receipt:{id:id, date:now, items:order.slice(), sub:sub, vat:vat, total:total,
    cust:custPhone?{name:custName||'Guest',phone:custPhone}:null, pts:pts, totalPts:cust?cust.points:0},
    order:[], custName:'', custPhone:'', tab:'receipt'});
}

function lookupLoy() {
  if (!S.loyPhone) return;
  ss({loyData: getCust(S.loyPhone)});
}

// ── RENDER ─────────────────────────────────────────────────────────────────────

    if(file&&file.type.startsWith('image/'))ss({imgSrc:URL.createObjectURL(file),imgType:file.type,imgB64:await f2b64(file),scanRes:null,err:null});
  };
  var scanB=document.getElementById('scanB'); if(scanB)scanB.onclick=doScan;
  var addAll=document.getElementById('addAll'); if(addAll)addAll.onclick=addScanned;

  // Order
  document.querySelectorAll('[data-qd]').forEach(function(b){b.onclick=function(){qChange(b.dataset.qd,-1);};});
  document.querySelectorAll('[data-qu]').forEach(function(b){b.onclick=function(){qChange(b.dataset.qu,1);};});
  document.querySelectorAll('[data-rm]').forEach(function(b){b.onclick=function(){ss({order:S.order.filter(function(o){return o.id!==b.dataset.rm;})});};});
  document.querySelectorAll('[data-am]').forEach(function(b){b.onclick=function(){addFromMenu(S.menu.find(function(m){return m.id===b.dataset.am;}));};});
  document.querySelectorAll('[data-oc]').forEach(function(b){b.onclick=function(){ss({oCat:b.dataset.oc});};});
  var os=document.getElementById('os'); if(os)os.oninput=function(e){ss({oSearch:e.target.value});};
  var cn=document.getElementById('cn'); if(cn)cn.oninput=function(e){S.custName=e.target.value;};
  var cp=document.getElementById('cp'); if(cp)cp.oninput=function(e){S.custPhone=e.target.value;};
  var genR=document.getElementById('genR'); if(genR)genR.onclick=genReceipt;

  // Receipt
  var printR=document.getElementById('printR'); if(printR)printR.onclick=function(){window.print();};
  var newOrd=document.getElementById('newOrd');
  if(newOrd)newOrd.onclick=function(){ss({tab:'order',order:[],scanRes:null,imgSrc:null,imgB64:null,custName:'',custPhone:'',receipt:null});};

  // Loyalty
  var lph=document.getElementById('lph');
  if(lph){lph.oninput=function(e){S.loyPhone=e.target.value;};lph.onkeydown=function(e){if(e.key==='Enter')lookupLoy();};}
  var lsrch=document.getElementById('lsrch'); if(lsrch)lsrch.onclick=lookupLoy;
}

// ── Settings ───────────────────────────────────────────────────────────────────
document.getElementById('settingsBtn').onclick = function() {
  document.getElementById('settingsOverlay').style.display='flex';
  document.getElementById('apiKeyIn').value = getKey();
};
document.getElementById('closeSettings').onclick = function() {
  document.getElementById('settingsOverlay').style.display='none';
};
document.getElementById('saveKey').onclick = function() {
  localStorage.setItem('pv_apikey', document.getElementById('apiKeyIn').value.trim());
  document.getElementById('settingsOverlay').style.display='none';
};
document.getElementById('settingsOverlay').onclick = function(e) {
  if(e.target===e.currentTarget) e.currentTarget.style.display='none';
};

// ── Boot ───────────────────────────────────────────────────────────────────────
loadMenu();
</script>
</body>
</html>
